<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Valuation Instrument — Multiscale Space Systems</title>
<meta name="description" content="A rigorous, triangulated pre-revenue valuation instrument for early-stage and deep-tech ventures."/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;background:#F6F7F9}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const C = { ink:'#16181D', sub:'#5B616E', faint:'#8A909C', paper:'#F6F7F9', panel:'#FFFFFF', line:'#E4E7EC', indigo:'#4338CA', indigoSoft:'#EEF0FF', teal:'#0F9D7A', tealSoft:'#E6F6F1', red:'#B42318' };
const SEAL = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="44" height="44"><circle cx="32" cy="32" r="31" fill="#0B1F3A"/><circle cx="32" cy="32" r="31" fill="none" stroke="#C8CDD6" stroke-width="2"/><circle cx="32" cy="32" r="26" fill="none" stroke="#1C3A5E" stroke-width="1"/><path d="M14 46 A24 24 0 0 1 50 46" fill="none" stroke="#E8741E" stroke-width="1.4" opacity="0.85"/><g opacity="0.9"><line x1="22" y1="14" x2="33" y2="24" stroke="#F2933B" stroke-width="1.4" stroke-linecap="round"/><line x1="28" y1="12" x2="37" y2="22" stroke="#E8741E" stroke-width="1.4" stroke-linecap="round"/><line x1="34" y1="12" x2="41" y2="22" stroke="#F2933B" stroke-width="1.2" stroke-linecap="round"/></g><g transform="rotate(28 34 34)"><path d="M28 24 L40 24 L44 38 L24 38 Z" fill="#EDEFF2"/><path d="M28 24 L34 24 L34 38 L24 38 Z" fill="#C8CDD6"/><ellipse cx="34" cy="38" rx="10" ry="3" fill="#E8741E"/><ellipse cx="34" cy="38" rx="6.5" ry="1.8" fill="#FFB36B"/><rect x="30" y="27" width="3" height="2.2" rx="0.5" fill="#1C3A5E"/><rect x="36" y="27" width="3" height="2.2" rx="0.5" fill="#1C3A5E"/></g></svg>';
const FACTORS = [['team','Team & Founders','Team'],['market','Market Size & Timing','Market'],['trl','Technical Maturity (TRL)','TRL'],['moat','Defensibility / IP Moat','IP Moat'],['exec','Execution Plan & Roadmap','Execution'],['strat','Strategic Relationships & Traction','Traction'],['capeff','Capital Efficiency','Cap. Eff.']];
const WEIGHTS = { 'Pre-seed':{team:.28,market:.15,trl:.12,moat:.20,exec:.12,strat:.08,capeff:.05}, 'Seed':{team:.24,market:.18,trl:.14,moat:.16,exec:.12,strat:.11,capeff:.05}, 'Series A':{team:.18,market:.20,trl:.15,moat:.12,exec:.13,strat:.17,capeff:.05} };
const DEF_A = {team:1.70,market:1.25,trl:1.05,moat:1.65,exec:1.55,strat:1.25,capeff:1.55};
const DEF_B = {team:1.10,market:1.10,trl:1.00,moat:1.55,exec:1.25,strat:1.05,capeff:1.20};
const JUST = {team:'Deep domain authority, IP plus papers as resume, proven inventive capacity',market:'Growing in-space services and reentry demand; dual-use pull',trl:'TRL 2-3, analytical plus early simulation',moat:'Rigorous provisional portfolio across orbital ops, reentry, landing',exec:'Milestone-to-budget mapping, written IP strategy',strat:'SBIR and agency engagement, early interest',capeff:'Bootstrapped, low-burn, milestone-driven'};
const median = arr => { const s=[...arr].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length?(s.length%2?s[m]:(s[m-1]+s[m])/2):0; };
const fmt = n => '$'+(n||0).toFixed(1)+'M';
const pct = n => ((n||0)*100).toFixed(1)+'%';
function Eyebrow({children}){return <div style={{color:C.faint,letterSpacing:'0.18em'}} className="text-xs font-semibold uppercase mb-2">{children}</div>;}
function Panel({children,style}){return <div style={{background:C.panel,borderColor:C.line,...style}} className="border rounded-2xl p-5 mb-5">{children}</div>;}
function Sel({label,value,onChange,options}){return <label className="block"><span style={{color:C.sub}} className="text-xs font-medium">{label}</span><select value={value} onChange={e=>onChange(e.target.value)} style={{borderColor:C.line,color:C.ink}} className="mt-1 w-full border rounded-lg px-3 py-2 text-sm bg-white">{options.map(o=><option key={o} value={o}>{o}</option>)}</select></label>;}
function Tick({p,color,label,small}){return <div style={{left:p}} className="absolute top-1/2 flex flex-col items-center"><div style={{background:color,width:small?6:9,height:small?6:9,borderColor:'#16181D',transform:'translate(-50%,-50%)'}} className="rounded-full border-2"/><span style={{color:color,transform:'translateX(-50%)'}} className="text-xs font-bold mt-1">{label}</span></div>;}
function RadarSVG({a,b}){
  const cx=100, cy=84, R=60, n=FACTORS.length;
  const ang=i=>(-Math.PI/2)+i*(2*Math.PI/n);
  const pt=(i,v)=>[+(cx+R*(v/2)*Math.cos(ang(i))).toFixed(1),+(cy+R*(v/2)*Math.sin(ang(i))).toFixed(1)];
  const poly=o=>FACTORS.map((f,i)=>pt(i,o[f[0]]).join(',')).join(' ');
  const rings=[0.5,1,1.5,2].map(s=>FACTORS.map((f,i)=>pt(i,s).join(',')).join(' '));
  return <svg viewBox="0 0 200 162" style={{width:'100%',maxHeight:240}}>
    {rings.map((r,k)=><polygon key={k} points={r} fill="none" stroke={C.line} strokeWidth="0.7"/>)}
    {FACTORS.map((f,i)=>{const q=pt(i,2);return <line key={i} x1={cx} y1={cy} x2={q[0]} y2={q[1]} stroke={C.line} strokeWidth="0.7"/>;})}
    <polygon points={poly(a)} fill={C.indigo} fillOpacity="0.15" stroke={C.indigo} strokeWidth="1.5"/>
    <polygon points={poly(b)} fill={C.teal} fillOpacity="0.15" stroke={C.teal} strokeWidth="1.5"/>
    {FACTORS.map((f,i)=>{const q=pt(i,2.34);return <text key={i} x={q[0]} y={q[1]} fontSize="6.4" fill={C.sub} textAnchor="middle" dominantBaseline="middle">{f[2]}</text>;})}
  </svg>;
}
function App(){
  const [stage,setStage]=useState('Pre-seed');
  const [tech,setTech]=useState('Deep Tech / Hard Tech');
  const [vert,setVert]=useState('Space');
  const [seg,setSeg]=useState('Reentry & Recovery (EDL)');
  const [vA,setVA]=useState(7);
  const [comps,setComps]=useState([8,10,12,12,15,20]);
  const [a,setA]=useState(DEF_A); const [b,setB]=useState(DEF_B);
  const [invest,setInvest]=useState(1.0);
  const w=WEIGHTS[stage];
  const vB=useMemo(()=>median(comps),[comps]);
  const sA=useMemo(()=>FACTORS.reduce((s,f)=>s+w[f[0]]*a[f[0]],0),[w,a]);
  const sB=useMemo(()=>FACTORS.reduce((s,f)=>s+w[f[0]]*b[f[0]],0),[w,b]);
  const VA=vA*sA, VB=vB*sB;
  const floor=Math.min(VA,VB), head=Math.max(VA,VB), central=(VA+VB)/2;
  const div=central?Math.abs(VA-VB)/central:0;
  const status=div<0.15?['Converged',C.teal,C.tealSoft]:div<0.35?['Moderate spread','#B45309','#FBEFE0']:['Diverged',C.red,'#FBE9E7'];
  const guard=vB>vA*1.3&&b.team>1.3;
  const berkus=4.7;
  const bmin=Math.min(VA,VB,berkus)*0.92, bmax=Math.max(VA,VB)*1.06;
  const pos=v=>(((v-bmin)/(bmax-bmin))*100)+'%';
  const own=central?invest/central:0;
  const reset=()=>{setA(DEF_A);setB(DEF_B);setComps([8,10,12,12,15,20]);setVA(7);setStage('Pre-seed');};
  const Slider=({val,on,col,tag})=> <div><div className="flex justify-between mb-1"><span style={{color:col}} className="text-xs font-bold uppercase">Route {tag}</span><span style={{color:C.ink}} className="text-xs font-mono font-semibold">{val.toFixed(2)}</span></div><input type="range" min="0.5" max="2" step="0.05" value={val} onChange={e=>on(parseFloat(e.target.value))} style={{accentColor:col,width:'100%'}}/></div>;
  return <div style={{color:C.ink,fontFamily:'ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto'}}>
    <header style={{borderColor:C.line,background:C.panel}} className="border-b"><div className="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between gap-3 flex-wrap"><div className="flex items-center gap-3"><span dangerouslySetInnerHTML={{__html:SEAL}}/><div><div style={{color:C.faint,letterSpacing:'0.16em'}} className="text-xs font-semibold uppercase">Multiscale Space Systems</div><h1 style={{letterSpacing:'-0.02em'}} className="text-xl sm:text-2xl font-bold leading-tight">The Valuation Instrument</h1></div></div><button onClick={reset} style={{borderColor:C.line,color:C.sub}} className="text-xs border rounded-lg px-3 py-2">Reset to example</button></div></header>
    <main className="max-w-6xl mx-auto px-5 py-6 grid lg:grid-cols-5 gap-6">
      <div className="lg:col-span-3">
        <Panel><Eyebrow>1 - Company Profile</Eyebrow><div className="grid sm:grid-cols-2 gap-4"><Sel label="Technology type" value={tech} onChange={setTech} options={['Deep Tech / Hard Tech','Hardware','Software / SaaS','Biotech / Medtech','AI-native Infrastructure','Consumer / Internet','Fintech']}/><Sel label="Vertical / domain" value={vert} onChange={setVert} options={['Space','Aerospace & Defense','Automotive & Mobility','Healthcare','Energy & Climate','Robotics','Industrials','Enterprise Software']}/><Sel label="Segment" value={seg} onChange={setSeg} options={['Reentry & Recovery (EDL)','Orbital Operations','Landing','Launch','Satellites & Payloads','In-Space Services','Ground Systems']}/><Sel label="Funding stage (sets weights)" value={stage} onChange={setStage} options={['Pre-seed','Seed','Series A']}/></div></Panel>
        <Panel><Eyebrow>2 - Base Anchors</Eyebrow><div className="grid sm:grid-cols-2 gap-5"><div><div style={{color:C.indigo}} className="text-xs font-bold uppercase mb-2">Route A - generic base</div><span style={{color:C.sub}} className="text-xs">Generic pre-seed base ($M)</span><input type="number" step="0.5" value={vA} onChange={e=>setVA(parseFloat(e.target.value)||0)} style={{borderColor:C.line}} className="mt-1 w-full border rounded-lg px-3 py-2 text-sm font-mono"/><p style={{color:C.faint}} className="text-xs mt-2">Conservative floor. US pre-seed median near $7.7M.</p></div><div><div style={{color:C.teal}} className="text-xs font-bold uppercase mb-2">Route B - peer base</div><span style={{color:C.sub}} className="text-xs">Comparable caps ($M), comma separated</span><input value={comps.join(', ')} onChange={e=>setComps(e.target.value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x)))} style={{borderColor:C.line}} className="mt-1 w-full border rounded-lg px-3 py-2 text-sm font-mono"/><div className="mt-2 flex items-center gap-2"><span style={{color:C.faint}} className="text-xs">Median</span><span style={{color:C.teal}} className="text-sm font-mono font-bold">{fmt(vB)}</span></div></div></div></Panel>
        <Panel><Eyebrow>3 - Scorecard - 1.00 is par with comparables</Eyebrow>{FACTORS.map(f=><div key={f[0]} style={{borderColor:C.line}} className="py-3 border-b"><div className="flex justify-between"><span className="text-sm font-medium">{f[1]}</span><span style={{color:C.faint}} className="text-xs font-mono">w {w[f[0]].toFixed(2)}</span></div><div className="grid grid-cols-2 gap-4 mt-2"><Slider tag="A" col={C.indigo} val={a[f[0]]} on={v=>setA({...a,[f[0]]:v})}/><Slider tag="B" col={C.teal} val={b[f[0]]} on={v=>setB({...b,[f[0]]:v})}/></div><p style={{color:C.faint}} className="text-xs mt-2">{JUST[f[0]]}</p></div>)}<div className="grid grid-cols-2 gap-4 mt-4"><div style={{background:C.indigoSoft}} className="rounded-xl p-3 text-center"><div style={{color:C.indigo}} className="text-xs font-bold uppercase">S - Route A</div><div style={{color:C.indigo}} className="text-lg font-mono font-bold">{sA.toFixed(3)}</div></div><div style={{background:C.tealSoft}} className="rounded-xl p-3 text-center"><div style={{color:C.teal}} className="text-xs font-bold uppercase">S - Route B</div><div style={{color:C.teal}} className="text-lg font-mono font-bold">{sB.toFixed(3)}</div></div></div></Panel>
      </div>
      <div className="lg:col-span-2"><div className="lg:sticky lg:top-6">
        <Panel style={{background:C.ink}}><Eyebrow>Headline - indicative SAFE cap</Eyebrow><div className="flex items-baseline gap-2"><span style={{color:'#fff',letterSpacing:'-0.03em'}} className="text-4xl font-bold font-mono">{fmt(central)}</span><span style={{color:C.faint}} className="text-sm">central</span></div><div style={{color:'#C7CBD4'}} className="text-sm mt-1 font-mono">{fmt(floor)} floor, {fmt(head)} headline</div><div className="mt-6"><div style={{background:'#2A2D35'}} className="relative h-2 rounded-full"><div style={{left:pos(floor),width:'calc('+pos(head)+' - '+pos(floor)+')',background:'linear-gradient(90deg,#4338CA,#0F9D7A)'}} className="absolute h-full rounded-full"/><Tick p={pos(VA)} color={C.indigo} label="A"/><Tick p={pos(VB)} color={C.teal} label="B"/><Tick p={pos(berkus)} color="#fff" label="Bk" small/><div style={{left:pos(central)}} className="absolute"><div style={{background:'#fff',width:2,height:20,transform:'translate(-50%,-9px)'}}/></div></div><div style={{color:C.faint}} className="flex justify-between text-xs mt-3 font-mono"><span>{fmt(bmin)}</span><span>methods on band</span><span>{fmt(bmax)}</span></div></div><div className="flex items-center gap-2 mt-5"><span style={{color:status[1],background:status[2]}} className="text-xs font-semibold px-2 py-1 rounded-full">{status[0]} - {pct(div)}</span><span style={{color:guard?C.red:C.teal,background:guard?'#FBE9E7':C.tealSoft}} className="text-xs font-semibold px-2 py-1 rounded-full">{guard?'Double-count flag':'Guard OK'}</span></div></Panel>
        <Panel><Eyebrow>Factor profile</Eyebrow><RadarSVG a={a} b={b}/><div className="flex justify-center gap-6 mt-1"><span style={{color:C.indigo}} className="text-xs font-semibold">Route A</span><span style={{color:C.teal}} className="text-xs font-semibold">Route B</span></div></Panel>
        <Panel><Eyebrow>Round math</Eyebrow><span style={{color:C.sub}} className="text-xs">New investment ($M)</span><input type="number" step="0.25" value={invest} onChange={e=>setInvest(parseFloat(e.target.value)||0)} style={{borderColor:C.line}} className="mt-1 w-full border rounded-lg px-3 py-2 text-sm font-mono"/><div className="grid grid-cols-2 gap-3 mt-4"><div style={{background:C.paper}} className="rounded-xl p-3"><div style={{color:C.faint}} className="text-xs uppercase font-semibold">Investor at cap</div><div className="text-lg font-mono font-bold">{pct(own)}</div></div><div style={{background:C.paper}} className="rounded-xl p-3"><div style={{color:C.faint}} className="text-xs uppercase font-semibold">Post-money if priced</div><div className="text-lg font-mono font-bold">{fmt(central+invest)}</div></div></div><p style={{color:C.faint}} className="text-xs mt-3">Pre-seed is usually a SAFE cap, not a priced round.</p></Panel>
      </div></div>
    </main>
    <footer style={{borderColor:C.line,color:C.faint}} className="border-t"><div className="max-w-6xl mx-auto px-5 py-5 text-xs leading-relaxed">Indicative triangulation, not investment advice. Early-stage valuation is a negotiated price, not a measurement; this instrument anchors that negotiation to comparables and bounded, justified factor scores. Replace the placeholder comparables with real cohort data before relying on a number.</div></footer>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
