<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Orbital Mechanics, From the Ground Up</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<style>
  :root{
    --bg:#06080f; --panel:rgba(11,15,24,0.92); --ink:#e8edf6; --muted:#8a97ad;
    --line:#1d2636; --accent:#5ad1ff; --accent2:#ffb454; --good:#79e08a; --warn:#ff6b6b;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
  #app{position:fixed;inset:0}
  canvas{display:block;touch-action:none}

  #topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:8px;
    padding:calc(8px + env(safe-area-inset-top,0px)) 12px 8px;
    background:linear-gradient(180deg,rgba(6,8,15,0.95),rgba(6,8,15,0));pointer-events:none}
  #topbar .ttext{min-width:0}
  #topbar .eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:0.22em;color:var(--accent);text-transform:uppercase}
  #topbar h1{font-size:13.5px;margin:0;font-weight:600;letter-spacing:0.01em;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #topbar .spacer{flex:1}
  .iconbtn{pointer-events:auto;width:34px;height:34px;flex:0 0 auto;border-radius:9px;border:1px solid var(--line);
    background:rgba(16,23,37,0.85);color:var(--muted);font-family:var(--mono);font-size:13px;display:flex;
    align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
  .iconbtn.on{border-color:var(--accent);color:var(--accent)}
  #counter{pointer-events:none;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:2px}

  /* zoom cluster */
  #zoom{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:25;display:flex;flex-direction:column;gap:8px}
  #zoom .iconbtn{font-size:17px;background:rgba(16,23,37,0.8)}

  /* data rail */
  #rail{position:fixed;top:calc(58px + env(safe-area-inset-top,0px));left:12px;z-index:24;width:184px;max-width:50vw;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(8px);
    padding:8px 11px 9px;font-family:var(--mono);font-size:11px;line-height:1.5}
  #rail.hidden{display:none}
  #rail .rk{color:var(--muted)}
  #rail .rv{color:var(--ink);float:right}
  #rail .row{clear:both;border-bottom:1px dashed rgba(255,255,255,0.05);padding:2px 0}
  #rail .row:last-child{border-bottom:none}
  #rail .rhdr{display:flex;justify-content:space-between;align-items:center;color:var(--accent);
    letter-spacing:0.12em;font-size:9px;text-transform:uppercase;margin-bottom:5px}
  #rail .rclose{cursor:pointer;color:var(--muted);font-size:12px;padding:0 2px}

  /* bottom sheet */
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:26;background:var(--panel);
    border-top:1px solid var(--line);backdrop-filter:blur(12px);
    transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:74vh;display:flex;flex-direction:column;
    border-radius:16px 16px 0 0}
  #sheet.collapsed{transform:translateY(calc(100% - var(--collapsed-h,116px)))}
  #shead{flex:0 0 auto;padding:8px 14px calc(8px) 14px;border-bottom:1px solid var(--line)}
  #grip{display:flex;align-items:center;gap:10px;cursor:pointer}
  #grip .bar{width:34px;height:4px;border-radius:2px;background:#2a3650}
  #grip .glabel{font-size:12px;color:var(--muted)}
  #grip .chev{margin-left:auto;color:var(--muted);font-family:var(--mono);font-size:12px;transition:transform .3s}
  #sheet.collapsed #grip .chev{transform:rotate(180deg)}

  /* narration player */
  #player{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  #playbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--accent);background:rgba(90,209,255,0.14);
    color:var(--accent);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto}
  #player select{flex:1 1 90px;min-width:80px;background:#101725;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:7px 8px;font-family:var(--mono);font-size:11px}
  #player .plabel{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;width:100%}

  #sheetbody{overflow-y:auto;padding:12px 16px calc(20px + var(--safe-b));-webkit-overflow-scrolling:touch}

  .explain{font-size:14px;line-height:1.64;color:#d3dcec;margin:0 0 12px}
  .explain p{margin:0 0 11px}
  .explain b{color:#fff;font-weight:600}
  .explain i{color:#cdd6e6}
  .explain .term{color:var(--accent);font-weight:600}

  .eqs{margin:6px 0 14px;padding:12px 13px;background:#0a0e18;border:1px solid var(--line);border-radius:10px}
  .eqrow{margin:0 0 10px}
  .eqrow:last-child{margin-bottom:0}
  .eqrow .katex{color:#eaf2ff;font-size:1.02em}
  .eqcap{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.02em}

  .sech{font-family:var(--mono);font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent2);
    margin:4px 0 7px}

  .controls{display:flex;flex-direction:column;gap:13px;margin:4px 0 8px}
  .ctl label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
    font-family:var(--mono);margin-bottom:5px;letter-spacing:0.02em}
  .ctl label .val{color:var(--accent)}
  input[type=range]{-webkit-appearance:none;width:100%;height:26px;background:transparent;margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:3px;background:#26324a;border-radius:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:var(--accent);margin-top:-10px;box-shadow:0 0 0 4px rgba(90,209,255,0.16)}
  input[type=range]::-moz-range-track{height:3px;background:#26324a;border-radius:3px}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--accent)}

  .toggles{display:flex;flex-wrap:wrap;gap:8px}
  .toggle{font-family:var(--mono);font-size:11px;padding:8px 12px;border-radius:8px;border:1px solid var(--line);
    background:#101725;color:var(--muted);cursor:pointer;user-select:none}
  .toggle.on{background:rgba(90,209,255,0.14);border-color:var(--accent);color:var(--accent)}
  .btn{font-family:var(--mono);font-size:11px;padding:9px 13px;border-radius:8px;border:1px solid var(--accent);
    background:rgba(90,209,255,0.12);color:var(--accent);cursor:pointer;display:inline-block}

  .nav{display:flex;gap:8px;align-items:center;padding-top:12px;margin-top:6px;border-top:1px solid var(--line)}
  .navbtn{flex:1;text-align:center;font-family:var(--mono);font-size:12px;padding:12px;border-radius:9px;
    border:1px solid var(--line);background:#101725;color:var(--ink);cursor:pointer}
  .navbtn[disabled]{opacity:0.32}
  .navbtn.primary{background:rgba(90,209,255,0.16);border-color:var(--accent);color:var(--accent)}

  .moduledots{display:flex;gap:5px;justify-content:center;margin:0 0 12px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;background:#222d40;cursor:pointer}
  .dot.active{background:var(--accent);transform:scale(1.25)}

  #err{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;
    background:#06080f;color:#ff8a8a;font-family:var(--mono);font-size:13px;padding:24px;text-align:center}
  #hint{position:fixed;left:50%;top:46%;transform:translateX(-50%);z-index:5;color:var(--muted);
    font-family:var(--mono);font-size:11px;letter-spacing:0.04em;pointer-events:none;opacity:0;transition:opacity .5s;text-align:center}
  #hint.show{opacity:0.75}
</style>
</head>
<body>
<div id="app"></div>

<div id="topbar">
  <div class="ttext">
    <div class="eyebrow">Orbital Mechanics</div>
    <h1 id="mtitle">Loading</h1>
  </div>
  <div class="spacer"></div>
  <div class="iconbtn" id="btnRail" title="Toggle data readout">DATA</div>
  <div class="iconbtn" id="btnReset" title="Reset view">&#8634;</div>
</div>

<div id="zoom">
  <div class="iconbtn" id="zin">+</div>
  <div class="iconbtn" id="zout">&minus;</div>
</div>

<div id="rail"></div>
<div id="hint">drag to rotate &middot; pinch or +/&minus; to zoom &middot; two fingers to pan</div>

<div id="sheet" class="collapsed">
  <div id="shead">
    <div id="grip">
      <div class="bar"></div>
      <div class="glabel" id="glabel">Lesson, equations &amp; narration</div>
      <div class="chev" id="chev">&#9650;</div>
    </div>
    <div id="player">
      <div class="plabel">Narration</div>
      <div id="playbtn">&#9658;</div>
      <select id="voiceSel" title="Voice"></select>
      <select id="rateSel" title="Speed">
        <option value="0.7">0.7&times;</option>
        <option value="0.85">0.85&times;</option>
        <option value="1" selected>1.0&times;</option>
        <option value="1.15">1.15&times;</option>
        <option value="1.3">1.3&times;</option>
      </select>
    </div>
  </div>
  <div id="sheetbody">
    <div class="moduledots" id="dots"></div>
    <div class="explain" id="explain"></div>
    <div class="sech" id="eqhdr" style="display:none">Key relations</div>
    <div class="eqs" id="eqs" style="display:none"></div>
    <div class="sech">Controls</div>
    <div class="controls" id="controls"></div>
    <div class="nav">
      <button class="navbtn" id="prev">&larr; Back</button>
      <button class="navbtn primary" id="next">Next &rarr;</button>
    </div>
  </div>
</div>

<div id="err"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
"use strict";
(function(){

const EARTH_KM = 6371, VC_SURF = 7.905;
function altU(km){ return km/EARTH_KM; }
function rU(km){ return 1 + altU(km); }

let scene, camera, renderer, world, sun;
const cam = { target:new THREE.Vector3(0,0,0), r:3.4, theta:0.7, phi:1.05, rMin:1.16, rMax:320 };
let active=null, lastT=0, idx=0;

/* ---------- helpers ---------- */
function disposeGroup(g){
  g.traverse(o=>{
    if(o.geometry) o.geometry.dispose();
    if(o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{ if(m.map)m.map.dispose(); m.dispose(); }); }
  });
  while(g.children.length) g.remove(g.children[0]);
}
function earthTexture(){
  const c=document.createElement('canvas'); c.width=1024; c.height=512; const x=c.getContext('2d');
  const grd=x.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#0b2a4a'); grd.addColorStop(0.5,'#0e3a63'); grd.addColorStop(1,'#0b2a4a');
  x.fillStyle=grd; x.fillRect(0,0,1024,512);
  const blobs=[[180,180,90,55],[300,150,70,45],[260,300,120,70],[560,160,110,80],[640,300,90,60],
               [780,210,70,50],[860,330,100,55],[120,330,60,40],[460,360,80,45]];
  x.fillStyle='#1f6b46'; blobs.forEach(b=>{ x.beginPath(); x.ellipse(b[0],b[1],b[2],b[3],0,0,Math.PI*2); x.fill(); });
  x.fillStyle='rgba(120,90,40,0.25)'; blobs.forEach(b=>{ x.beginPath(); x.ellipse(b[0],b[1],b[2]*0.6,b[3]*0.6,0,0,Math.PI*2); x.fill(); });
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}
function makeEarth(opt){
  opt=opt||{}; const g=new THREE.Group();
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(1,64,48),
    new THREE.MeshPhongMaterial({map:earthTexture(),shininess:8,specular:0x223344}));
  if(opt.oblate) mesh.scale.set(1,0.9966,1);
  g.add(mesh); g.userData.mesh=mesh;
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1.03,48,32),
    new THREE.MeshBasicMaterial({color:0x4aa3ff,transparent:true,opacity:0.10,side:THREE.BackSide})));
  return g;
}
function graticule(R,color,step){
  step=step||30; color=color||0x2b6da3; const grp=new THREE.Group();
  const matN=new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.45});
  const matEq=new THREE.LineBasicMaterial({color:0x6fe0ff,transparent:true,opacity:0.9});
  const matPm=new THREE.LineBasicMaterial({color:0xffb454,transparent:true,opacity:0.85});
  for(let lat=-60;lat<=60;lat+=step){
    const r=R*Math.cos(lat*Math.PI/180), y=R*Math.sin(lat*Math.PI/180); const pts=[];
    for(let a=0;a<=360;a+=4){const t=a*Math.PI/180; pts.push(new THREE.Vector3(r*Math.cos(t),y,r*Math.sin(t)));}
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lat===0?matEq:matN));
  }
  for(let lon=0;lon<360;lon+=step){
    const pts=[]; for(let a=-90;a<=90;a+=3){const t=a*Math.PI/180; const r=R*Math.cos(t);
      pts.push(new THREE.Vector3(r*Math.cos(lon*Math.PI/180), R*Math.sin(t), r*Math.sin(lon*Math.PI/180)));}
    grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lon===0?matPm:matN));
  }
  return grp;
}
function ringPoints(R,n){const p=[];for(let i=0;i<=n;i++){const t=i/n*Math.PI*2;p.push(new THREE.Vector3(R*Math.cos(t),0,R*Math.sin(t)));}return p;}
function circle(R,color,op){return new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPoints(R,128)),
  new THREE.LineBasicMaterial({color:color,transparent:true,opacity:op==null?0.9:op}));}
function ellipseLine(a,e,color){const p=[]; const pp=a*(1-e*e);
  for(let i=0;i<=200;i++){const th=i/200*Math.PI*2; const r=pp/(1+e*Math.cos(th)); p.push(new THREE.Vector3(r*Math.cos(th),0,r*Math.sin(th)));}
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(p),new THREE.LineBasicMaterial({color:color}));}
function label(text,color){
  const c=document.createElement('canvas'); c.width=256; c.height=64; const x=c.getContext('2d');
  x.font='600 30px -apple-system,Segoe UI,Roboto,sans-serif'; x.fillStyle=color||'#e8edf6';
  x.textBaseline='middle'; x.textAlign='center'; x.shadowColor='rgba(0,0,0,0.9)'; x.shadowBlur=6; x.fillText(text,128,34);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,depthWrite:false,transparent:true}));
  s.renderOrder=999; s.scale.set(0.62,0.155,1); return s;
}
function arrow(dir,origin,len,color){const d=dir.clone(); if(d.length()<1e-6)d.set(0,1,0); d.normalize();
  return new THREE.ArrowHelper(d,origin,len,color,Math.min(0.18,len*0.3),Math.min(0.11,len*0.18));}
function dot(R,color){return new THREE.Mesh(new THREE.SphereGeometry(R,16,12),new THREE.MeshBasicMaterial({color:color}));}
function starfield(){
  const n=1500,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){const r=240+Math.random()*340,u=Math.random()*2-1,t=Math.random()*Math.PI*2,s=Math.sqrt(1-u*u);
    pos[i*3]=r*s*Math.cos(t);pos[i*3+1]=r*u;pos[i*3+2]=r*s*Math.sin(t);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  return new THREE.Points(g,new THREE.PointsMaterial({color:0x9fb4d6,size:1.1,sizeAttenuation:false}));
}
function setRail(title,rows){
  const el=document.getElementById('rail');
  if(railHidden || !rows || !rows.length){ el.style.display='none'; return; }
  el.style.display='block';
  let h='<div class="rhdr">'+title+'<span class="rclose" id="rclose">&times;</span></div>';
  rows.forEach(r=>{ h+='<div class="row"><span class="rk">'+r[0]+'</span><span class="rv" style="color:'+(r[2]||'#e8edf6')+'">'+r[1]+'</span></div>'; });
  el.innerHTML=h;
  const rc=document.getElementById('rclose'); if(rc) rc.onclick=()=>{ railHidden=true; el.style.display='none'; document.getElementById('btnRail').classList.remove('on'); };
}
let railHidden=false;

/* ---------- control builders ---------- */
const C=()=>document.getElementById('controls');
function slider(o){
  const w=document.createElement('div');w.className='ctl';
  const id='s'+Math.random().toString(36).slice(2,7);
  w.innerHTML='<label for="'+id+'">'+o.label+'<span class="val" id="'+id+'v">'+o.fmt(o.value)+'</span></label>'+
    '<input id="'+id+'" type="range" min="'+o.min+'" max="'+o.max+'" step="'+(o.step||1)+'" value="'+o.value+'">';
  C().appendChild(w);
  const inp=w.querySelector('input'),vv=w.querySelector('#'+id+'v');
  inp.addEventListener('input',()=>{const v=parseFloat(inp.value);vv.textContent=o.fmt(v);o.on(v);});
  return inp;
}
function toggleRow(items){
  const w=document.createElement('div');w.className='toggles';
  items.forEach(it=>{const b=document.createElement('div');b.className='toggle'+(it.on?' on':'');b.textContent=it.label;
    b.addEventListener('click',()=>{it.on=!it.on;b.classList.toggle('on',it.on);it.cb(it.on);});w.appendChild(b);});
  C().appendChild(w);
}
function button(lbl,cb){const b=document.createElement('div');b.className='btn';b.textContent=lbl;b.addEventListener('click',cb);C().appendChild(b);}

/* ============================================================ MODULES ============================================================ */
const MODULES=[];

MODULES.push({
  title:'The field, and its vocabulary',
  camR:3.4,
  explain:`<p>The motion of bodies under gravity is governed by a single law that Newton set down in 1687. Two named disciplines sit on top of it. <span class="term">Celestial mechanics</span> is the physics of how natural bodies move; <span class="term">orbital mechanics</span>, also called <span class="term">astrodynamics</span>, is the engineering of placing a spacecraft on a chosen trajectory. Both reduce to one statement: every mass attracts every other mass, and that attraction bends an otherwise straight path into an orbit.</p>
  <p>The terms used throughout this material are defined once here. An <span class="term">orbit</span> is the closed path one body traces around another. The <span class="term">orbital plane</span> is the flat surface that path occupies, and it always contains the centre of the primary body. <span class="term">Inclination</span> is the tilt of that plane relative to the equator. <span class="term">Eccentricity</span> measures how far the orbit departs from a circle. <span class="term">Apogee</span> and <span class="term">perigee</span> are the farthest and nearest points to Earth. <span class="term">Delta-v</span> is any change in velocity, and it is the quantity that propellant buys. A <span class="term">plane change</span> rotates the orbital plane and is among the most costly maneuvers. <span class="term">LEO</span>, <span class="term">MEO</span>, and <span class="term">GEO</span> denote low, medium, and geostationary altitude bands.</p>`,
  eqs:[
    {tex:String.raw`\vec{F} = G\,\frac{M\,m}{r^{2}}\,(-\hat{r})`, note:'Newton: the force is attractive and along the line joining the masses.'}
  ],
  narr:`This subject has a precise name. The physics of how bodies move under gravity is called celestial mechanics. The engineering of placing a spacecraft on a chosen path is called orbital mechanics, or astrodynamics. Both rest on one law from Newton: every mass attracts every other mass, and that attraction is what bends a straight line into an orbit. Here is the vocabulary you will hear repeatedly. An orbit is the closed path one body traces around another. The orbital plane is the flat surface that path lies in, and it always passes through the centre of the planet. Inclination is the tilt of that plane against the equator. Eccentricity is how far the orbit departs from a circle. Apogee and perigee are the farthest and nearest points to Earth. Delta v is any change in velocity, and it is what propellant pays for. A plane change rotates the orbital plane, and it is expensive. And the bands: low Earth orbit, medium Earth orbit, and geostationary orbit. Every one of these is built into a picture you can move.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004));
    const ax=new THREE.Group();
    ax.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1.5,0),new THREE.Vector3(0,1.6,0)]),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.22})));
    const np=label('spin axis','#9fb4d6'); np.position.set(0,1.75,0); ax.add(np); world.add(ax);
  },
  update(dt){ world.children[0].rotation.y+=dt*0.1; world.children[1].rotation.y+=dt*0.1; }
});

MODULES.push({
  title:'The Earth: its shape and its atmosphere',
  camR:3.0,
  explain:`<p>The Earth is not a perfect sphere. Because it rotates, it bulges at the equator and flattens at the poles, producing an <span class="term">oblate spheroid</span>. Its mean radius is about <b>6,371 km</b>. The equatorial radius exceeds the polar radius by roughly <b>21 km</b>, a flattening of about one part in 298. Modest as that sounds, it drives a measurable drift in real orbits, treated formally in the J2 perturbation.</p>
  <p>Above the surface lies the <span class="term">atmosphere</span>, structured in layers: the <b>troposphere</b> to about 12 km, the <b>stratosphere</b> to about 50 km, the <b>mesosphere</b> to about 85 km, the <b>thermosphere</b> to about 600 km, and the tenuous <b>exosphere</b> beyond. The <span class="term">Karman line</span> at <b>100 km</b> is the conventional boundary of space. The essential fact is one of scale: nearly all of the atmosphere lies within one and a half percent of a single Earth radius. This is precisely why low orbits pass so close to the surface. Raise the exaggeration control to see the shells, then lower it to one to register their true thinness.</p>`,
  eqs:[
    {tex:String.raw`f = \frac{a-b}{a} \approx \frac{1}{298.3}`, note:'Flattening: a is the equatorial radius, b the polar radius.'},
    {tex:String.raw`h_{\text{Karman}} = 100\ \text{km} \approx 0.0157\,R_\oplus`, note:'The boundary of space, as a fraction of Earth radius.'}
  ],
  narr:`The Earth is not a perfect ball. Because it spins, it bulges at the equator and flattens at the poles. The proper term is an oblate spheroid. Its mean radius is about six thousand three hundred seventy one kilometres, and the equator is wider than the pole to pole distance by about twenty one kilometres. That is a flattening of roughly one part in three hundred. Small, but it is large enough to drift a real orbit over time, which is handled formally by what is called the J2 perturbation. Above the surface sits the atmosphere, in layers. The troposphere holds the weather, up to about twelve kilometres. The stratosphere holds the ozone, to about fifty. Then the mesosphere, the thermosphere, and the thin exosphere fading into space. The Karman line at one hundred kilometres is the agreed boundary of space. Here is the point to feel. Nearly all of the air lies within one and a half percent of a single Earth radius. That is exactly why low orbits skim so close to the surface. Raise the exaggeration slider to see the shells, then drop it to one to feel how thin the air really is.`,
  build(){
    world.add(makeEarth({oblate:true})); world.add(graticule(1.004,0x2b6da3,30));
    const shells=new THREE.Group(); world.add(shells); this.shells=shells; this.exag=18; this.rebuild();
  },

      this.shells.add(new THREE.Mesh(new THREE.SphereGeometry(R,48,32),
        new THREE.MeshBasicMaterial({color:d[1],transparent:true,opacity:0.10,side:THREE.DoubleSide})));});
    const Rk=1+altU(100)*this.exag; const k=circle(Rk,0xffffff,0.9); k.rotation.x=Math.PI/2; this.shells.add(k);
    const kl=label('Karman 100 km','#ffffff'); kl.position.set(0,Rk+0.05,0); this.shells.add(kl);
    setRail('Atmosphere',[['Earth radius','6,371 km'],['Equator bulge','+21 km','#ffb454'],
      ['Karman line','100 km','#6fe0ff'],['Exaggeration','x'+this.exag.toFixed(0),'#5ad1ff']]);
  },
  controls(){
    slider({label:'Altitude exaggeration',value:18,min:1,max:40,step:1,fmt:v=>'x'+v,on:v=>{this.exag=v;this.rebuild();}});
    toggleRow([{label:'Show oblate bulge',on:true,cb:on=>{world.children[0].userData.mesh.scale.set(1,on?0.9966:1,1);}}]);

});

MODULES.push({
  title:'Gravity: the field that does the pulling',
  camR:4.4,
  explain:`<p>Newton's law of gravitation is the engine of the entire subject. The force between two masses is proportional to each mass and falls off with the square of the distance between them. Because a satellite's mass is negligible beside the Earth's, the satellite responds only to the Earth's field, an acceleration directed at the centre with magnitude <b>g(r) = GM / r&sup2;</b>. The defining feature is the inverse square: doubling the distance reduces gravity to one quarter.</p>
  <p>Gravity never falls to zero, so nothing truly detaches. The Moon remains bound at 384,400 km. To <i>escape</i> means only to carry enough speed that the orbit opens and does not return. Gravity should not be confused with the <span class="term">magnetic field</span>. Gravity arises from <b>mass</b> and points radially inward, uniform in character over the globe. The magnetic field arises from circulating currents in the Earth's molten iron outer core, a self sustaining dynamo, and it loops from pole to pole like a bar magnet. Switch the display between the two: radial spokes for gravity, looping lines for magnetism.</p>`,
  eqs:[
    {tex:String.raw`F = G\,\frac{M\,m}{r^{2}}, \qquad G = 6.674\times10^{-11}\ \mathrm{N\,m^2\,kg^{-2}}`, note:'Newton\u2019s law of universal gravitation.'},
    {tex:String.raw`g(r) = \frac{GM}{r^{2}} = g_0\left(\frac{R_\oplus}{r}\right)^{2}, \quad g_0 = 9.81\ \mathrm{m/s^2}`, note:'Surface gravity scaled by the inverse square of distance.'}
  ],
  narr:`Newton's law of gravitation is the whole engine. The force between two masses grows with each mass and shrinks with the square of the distance between them. Because a satellite is tiny next to the Earth, it responds only to the Earth's field. That field is an acceleration pointing straight at the centre, equal to G times the Earth's mass divided by distance squared. The defining feature is the inverse square. Double your distance, and gravity drops to one quarter. Said another way: gravity weakens fast, but it never reaches zero. So nothing truly detaches. The Moon is still firmly held, three hundred eighty four thousand kilometres away. When people say escape, they do not mean gravity switched off. They mean carrying enough speed that the orbit opens up and never comes back. Now, do not confuse gravity with magnetism. Gravity comes from mass and points straight inward, the same character everywhere. The magnetic field comes from electric currents in the Earth's molten iron core, a spinning dynamo, and it loops from pole to pole like a bar magnet. Toggle between the two displays and watch how different they are. Drag the altitude slider and read how gravity falls with height.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004));
    this.gGrp=new THREE.Group(); this.mGrp=new THREE.Group(); world.add(this.gGrp); world.add(this.mGrp);
    for(let k=0;k<14;k++){ const a=k/14*Math.PI*2;
      for(const rr of [1.25,1.6,2.2,3.2]){ const o=new THREE.Vector3(rr*Math.cos(a),0,rr*Math.sin(a));
        this.gGrp.add(arrow(o.clone().multiplyScalar(-1),o,0.45/(rr*rr)+0.04,0x5ad1ff)); } }
    for(let i=0;i<10;i++){ const L=1.4+i*0.45; const pts=[];
      for(let th=2;th<178;th+=3){const t=th*Math.PI/180; const r=L*Math.sin(t)*Math.sin(t); if(r<1.0)continue; pts.push(new THREE.Vector3(r*Math.sin(t),r*Math.cos(t),0));}
      if(pts.length>2){const a=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xff8aa0,transparent:true,opacity:0.7}));
        for(let rot=0;rot<4;rot++){const c=a.clone();c.rotation.y=rot*Math.PI/2;this.mGrp.add(c);}}}
    this.mGrp.visible=false;
    this.tm=dot(0.05,0xffb454); world.add(this.tm); this.tmA=arrow(new THREE.Vector3(-1,0,0),new THREE.Vector3(2,0,0),0.4,0xffb454); world.add(this.tmA);
    this.setAlt(1000);
  },
  setAlt(km){ const r=rU(km); this.tm.position.set(r,0,0); const g=9.81/(r*r);
    this.tmA.position.copy(this.tm.position); this.tmA.setLength(Math.min(0.7,0.5/(r*r)+0.05),0.12,0.08);
    setRail('Gravity readout',[['Test mass altitude',Math.round(km).toLocaleString()+' km'],
      ['Distance from centre',r.toFixed(2)+' R'],['g at surface','9.81 m/s\u00B2'],
      ['g here',g.toFixed(2)+' m/s\u00B2','#ffb454'],['vs surface',(g/9.81*100).toFixed(0)+'%','#5ad1ff']]); },
  controls(){
    slider({label:'Test mass altitude (km)',value:1000,min:0,max:36000,step:100,fmt:v=>Math.round(v).toLocaleString(),on:v=>this.setAlt(v)});
    toggleRow([{label:'Gravity field',on:true,cb:on=>{this.gGrp.visible=on;}},{label:'Magnetic field',on:false,cb:on=>{this.mGrp.visible=on;}}]);
  },
  update(dt){ world.children[0].rotation.y+=dt*0.05; }
});

MODULES.push({
  title:'What an orbit actually is',
  camR:3.8,
  explain:`<p>Newton's thought experiment settles the matter. Place a cannon on a tall mountain and fire horizontally. At low speed the ball arcs to the ground. At higher speed it lands farther away. At sufficient speed the surface curves away beneath it as fast as it falls, so it continues to miss the Earth indefinitely. <b>An orbit is therefore continuous free fall.</b> The satellite is always falling toward the centre; it simply carries enough transverse speed never to arrive.</p>
  <p>The thresholds follow from the energy of the motion. At this altitude, below roughly <b>7.9 km/s</b> the path intersects the surface, a suborbital trajectory of the kind a ballistic missile follows. Near 7.9 km/s the path closes into a circle. Above it the far side rises and the orbit becomes an <span class="term">ellipse</span>. At <b>11.2 km/s</b>, the escape speed, the path no longer closes and the body departs permanently. The blue vector is velocity, tangent to the path; the orange vector is gravity, always toward the centre. Note that gravity acts across the direction of motion, and that transverse pull is what curves a straight line into an orbit.</p>`,
  eqs:[
    {tex:String.raw`\frac{GMm}{r^{2}} = \frac{m\,v^{2}}{r} \;\Rightarrow\; v_{\text{circ}} = \sqrt{\frac{GM}{r}}`, note:'Circular orbit: gravity supplies exactly the centripetal force.'},
    {tex:String.raw`v_{\text{esc}} = \sqrt{\frac{2GM}{r}} = \sqrt{2}\,\;v_{\text{circ}}`, note:'Escape speed is the circular speed multiplied by root two.'}
  ],
  narr:`Newton's own thought experiment cracks this open. Put a cannon on a tall mountain and fire sideways. Fire slowly, and the ball arcs down to the ground. Fire faster, and it lands farther away. Fire fast enough, and the ground curves away beneath it just as fast as the ball falls, so it keeps missing the Earth, forever. That is an orbit. It is continuous free fall. The satellite is always falling toward the centre. It simply carries enough sideways speed that it never arrives. The thresholds come straight from the energy. At this altitude, below about seven point nine kilometres per second, the path strikes the surface. That is a suborbital lob, the kind a missile follows. Right around seven point nine, the path closes into a circle. Above that, the far side lifts and the orbit becomes an ellipse. At eleven point two kilometres per second, the escape speed, the path no longer closes, and the body leaves for good. The blue arrow is velocity, where it is going. The orange arrow is gravity, always toward the centre. Watch this: gravity pulls across the direction of motion, and that sideways pull is exactly what curves a straight line into an orbit. Drag the speed slider and watch fall become circle become escape.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004));
    this.r0=1.04; this.launch=new THREE.Vector3(this.r0,0,0);
    const m=dot(0.04,0xffffff); m.position.copy(this.launch); world.add(m);
    this.proj=dot(0.05,0x5ad1ff); world.add(this.proj);
    this.trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints([this.launch.clone()]),new THREE.LineBasicMaterial({color:0x5ad1ff})); world.add(this.trail);
    this.vArr=arrow(new THREE.Vector3(0,0,1),this.launch,0.4,0x5ad1ff); world.add(this.vArr);
    this.gArr=arrow(new THREE.Vector3(-1,0,0),this.launch,0.3,0xffb454); world.add(this.gArr);
    this.speedKms=7.9; this.reset();
  },
  reset(){ const v=this.speedKms/VC_SURF; this.state={p:this.launch.clone(),v:new THREE.Vector3(0,0,v)};
    this.path=[this.launch.clone()]; this.dead=false; this.status='in flight'; this.refreshTrail(); },
  refreshTrail(){ this.trail.geometry.dispose(); this.trail.geometry=new THREE.BufferGeometry().setFromPoints(this.path); },
  accel(p){ const r=p.length(); return p.clone().multiplyScalar(-1/(r*r*r)); },
  rk4(s,h){ const a=p=>this.accel(p); const p0=s.p,v0=s.v;
    const k1v=a(p0),k1p=v0;
    const k2v=a(p0.clone().addScaledVector(k1p,h/2)),k2p=v0.clone().addScaledVector(k1v,h/2);
    const k3v=a(p0.clone().addScaledVector(k2p,h/2)),k3p=v0.clone().addScaledVector(k2v,h/2);
    const k4v=a(p0.clone().addScaledVector(k3p,h)),k4p=v0.clone().addScaledVector(k3v,h);
    return {p:p0.clone().add(k1p.clone().add(k2p.clone().multiplyScalar(2)).add(k3p.clone().multiplyScalar(2)).add(k4p).multiplyScalar(h/6)),
            v:v0.clone().add(k1v.clone().add(k2v.clone().multiplyScalar(2)).add(k3v.clone().multiplyScalar(2)).add(k4v).multiplyScalar(h/6))}; },
  controls(){
    slider({label:'Launch speed (km/s)',value:7.9,min:1,max:12,step:0.05,fmt:v=>v.toFixed(2),on:v=>{this.speedKms=v;this.reset();}});
    button('Re-fire',()=>this.reset());
  },
  update(dt){
    if(world.children[0]) world.children[0].rotation.y+=dt*0.02;
    if(this.dead){ this.rail2(); return; }
    for(let i=0;i<60;i++){ this.state=this.rk4(this.state,0.012); const r=this.state.p.length();
      if(r<=1.0){ this.dead=true; this.status='impact (suborbital)'; break; }
      if(r>9 && this.state.v.lengthSq()>2/r){ this.dead=true; this.status='escaped'; break; }
      if(i%4===0){ this.path.push(this.state.p.clone()); if(this.path.length>1600)this.path.shift(); } }
    this.refreshTrail(); this.proj.position.copy(this.state.p);
    this.vArr.position.copy(this.state.p); this.vArr.setDirection(this.state.v.clone().normalize()); this.vArr.setLength(Math.min(0.6,this.state.v.length()*0.4),0.12,0.08);
    this.gArr.position.copy(this.state.p); this.gArr.setDirection(this.state.p.clone().multiplyScalar(-1).normalize());
    this.rail2();
  },
  rail2(){ const r=this.state.p.length(); const vc=this.state.v.length()*VC_SURF;
    let col='#5ad1ff'; if(this.status.indexOf('impact')>=0)col='#ff6b6b'; if(this.status==='escaped')col='#79e08a';
    setRail('Trajectory',[['Launch speed',this.speedKms.toFixed(2)+' km/s'],['Current speed',vc.toFixed(2)+' km/s','#5ad1ff'],
      ['Altitude',Math.round((r-1)*EARTH_KM).toLocaleString()+' km'],['Circular @ surf','7.91 km/s','#8a97ad'],
      ['Escape @ surf','11.18 km/s','#8a97ad'],['Status',this.status,col]]); }
});

MODULES.push({
  title:'Orbital plane, inclination, and the grid',
  camR:3.8,
  explain:`<p>The grid on the globe fixes position. <span class="term">Latitude</span> is the angle north or south of the equator, from 0 degrees at the equator to 90 degrees at the poles; the bright line marks the equator. <span class="term">Longitude</span> is the angle east or west of the prime meridian, marked in orange. Together they locate any point on the surface.</p>
  <p>A satellite's path lies in a flat <span class="term">orbital plane</span>, and that plane <b>contains the centre of the Earth</b>; it cannot be offset to one side, because gravity is directed at the centre. The tilt of the plane relative to the equator is the <span class="term">inclination</span>, i. At 0 degrees the orbit is equatorial. At 90 degrees it is polar and crosses both poles, which is why polar orbits are used for global imaging. The consequence is precise: a satellite at inclination i passes only over latitudes between plus and minus i. Inclination is therefore a ceiling on coverage. The point where the orbit crosses the equator heading north is the <span class="term">ascending node</span>.</p>`,
  eqs:[
    {tex:String.raw`|\,\varphi\,| \le i`, note:'A satellite at inclination i overflies only latitudes up to i.'},
    {tex:String.raw`\sin\varphi = \sin i \,\sin(\omega + \nu)`, note:'Ground point latitude as the satellite advances along the orbit.'}
  ],
  narr:`First the grid. Latitude is your angle north or south of the equator, zero at the equator and ninety at the poles. The bright line is the equator. Longitude is your angle east or west of the prime meridian, the orange line. Together they pin any point on Earth. Now the orbit. A satellite's path lies in a flat orbital plane, and that plane must contain the centre of the Earth. It cannot sit off to one side, because gravity points at the centre, so the motion stays centred. The tilt of that plane against the equator is the inclination. At zero degrees, the orbit hugs the equator. At ninety degrees, it is polar, crossing both poles, which is ideal for mapping the whole planet. Here is the consequence worth remembering. A satellite at a given inclination only ever flies over latitudes up to that angle, north and south. Inclination is a ceiling on which parts of Earth you can pass over. The point where the orbit crosses the equator going north is called the ascending node. Drag the inclination slider and watch the plane tilt, and watch the coverage ceiling change with it.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004,0x2b6da3,30));
    this.R=1.45; this.inc=51.6; this.raan=0; this.orbit=new THREE.Group(); world.add(this.orbit);
    this.orbit.add(circle(this.R,0x5ad1ff,0.95));
    const disk=new THREE.Mesh(new THREE.CircleGeometry(this.R,64),new THREE.MeshBasicMaterial({color:0x5ad1ff,transparent:true,opacity:0.07,side:THREE.DoubleSide}));
    disk.rotation.x=-Math.PI/2; this.orbit.add(disk); this.disk=disk;
    this.sat=dot(0.06,0xffffff); this.orbit.add(this.sat);
    this.node=label('ascending node','#79e08a'); this.orbit.add(this.node); this.t=0; this.apply();
  },
  apply(){ this.orbit.rotation.set(0,0,0); this.orbit.rotation.z=this.inc*Math.PI/180; this.orbit.rotation.y=this.raan*Math.PI/180;
    setRail('Orbit geometry',[['Inclination',this.inc.toFixed(0)+'\u00B0','#5ad1ff'],['RAAN',this.raan.toFixed(0)+'\u00B0'],
      ['Altitude',Math.round((this.R-1)*EARTH_KM).toLocaleString()+' km'],['Max latitude','\u00B1'+this.inc.toFixed(0)+'\u00B0','#ffb454'],
      ['Type',this.inc<10?'near-equatorial':this.inc>80?'near-polar':'inclined','#79e08a']]); },
  controls(){
    slider({label:'Inclination',value:51.6,min:0,max:90,step:1,fmt:v=>v+'\u00B0',on:v=>{this.inc=v;this.apply();}});
    slider({label:'RAAN (node longitude)',value:0,min:0,max:360,step:5,fmt:v=>v+'\u00B0',on:v=>{this.raan=v;this.apply();}});
    toggleRow([{label:'Show plane',on:true,cb:on=>{this.disk.visible=on;}}]);
  },
  update(dt){ world.children[0].rotation.y+=dt*0.05; world.children[1].rotation.y+=dt*0.05;
    this.t+=dt*0.6; this.sat.position.set(this.R*Math.cos(this.t),0,this.R*Math.sin(this.t)); this.node.position.set(this.R*1.05,0,0); }

MODULES.push({
  title:'Why orbits are ellipses',
  camR:5.0,
  explain:`<p>Solving Newton's gravity for a small body yields a <span class="term">conic section</span> in every case: a circle, an ellipse, a parabola, or a hyperbola. Every closed orbit is an <span class="term">ellipse</span> with the Earth at one <span class="term">focus</span>, not at the centre. The circle is the special case of zero <span class="term">eccentricity</span>.</p>
  <p>Two numbers fix the shape. The <span class="term">semi-major axis</span> a sets the overall size, and the eccentricity e sets the elongation. The nearest point is <span class="term">perigee</span>, the farthest <span class="term">apogee</span>. This is Kepler's first law. His second law is the motion to watch: the satellite <b>accelerates toward perigee and slows toward apogee</b>, sweeping equal areas in equal time. It exchanges height for speed, in the same way a thrown ball moves fastest at the bottom of its arc. The speed at any radius follows from the vis-viva relation. Raise the eccentricity and observe the satellite race through the low pass and crawl at the high one.</p>`,
  eqs:[
    {tex:String.raw`r(\nu) = \frac{a\,(1-e^{2})}{1 + e\cos\nu}`, note:'Kepler\u2019s first law: the orbit is a conic with Earth at a focus.'},
    {tex:String.raw`v^{2} = GM\!\left(\frac{2}{r} - \frac{1}{a}\right)`, note:'Vis-viva: speed as a function of current radius and orbit size.'},
    {tex:String.raw`T = 2\pi\sqrt{\dfrac{a^{3}}{GM}}`, note:'Kepler\u2019s third law: period depends only on the semi-major axis.'}
  ],
  narr:`Solve Newton's gravity for a small body, and the answer is always a conic section. A circle, an ellipse, a parabola, or a hyperbola. Every closed orbit is an ellipse, with the Earth sitting at one focus, not at the centre. A circle is just the special case where the stretch, the eccentricity, is zero. Two numbers fix the shape. The semi major axis sets the overall size, and the eccentricity sets how stretched it is. The nearest point is called perigee, the farthest apogee. That is Kepler's first law. His second law is the part to watch move. The satellite speeds up as it approaches perigee and slows as it climbs to apogee, sweeping equal areas in equal time. It trades height for speed, the same way a thrown ball is fastest at the bottom of its arc. The exact speed at any distance comes from the vis viva equation shown below. Raise the eccentricity slider, and watch the satellite race through the low pass and crawl at the top.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004));
    this.a=2.2; this.e=0.45; this.orbit=new THREE.Group(); world.add(this.orbit);
    this.line=ellipseLine(this.a,this.e,0x5ad1ff); this.orbit.add(this.line);
    this.sat=dot(0.06,0xffffff); this.orbit.add(this.sat);
    this.vArr=arrow(new THREE.Vector3(0,0,1),new THREE.Vector3(),0.3,0x5ad1ff); this.orbit.add(this.vArr);
    this.peri=label('perigee','#79e08a'); this.apo=label('apogee','#ffb454'); this.orbit.add(this.peri); this.orbit.add(this.apo); this.th=0; this.apply();
  },
  clampE(){ if(this.a*(1-this.e)<1.06) this.e=1-1.06/this.a; if(this.e<0)this.e=0; },
  apply(){ this.clampE(); this.orbit.remove(this.line); this.line.geometry.dispose();
    this.line=ellipseLine(this.a,this.e,0x5ad1ff); this.orbit.add(this.line);
    const rp=this.a*(1-this.e), ra=this.a*(1+this.e); this.peri.position.set(rp,0,0); this.apo.position.set(-ra,0,0.0001);
    setRail('Shape (Kepler)',[['Semi-major a',this.a.toFixed(2)+' R'],['Eccentricity',this.e.toFixed(2),'#5ad1ff'],
      ['Perigee alt',Math.round((rp-1)*EARTH_KM).toLocaleString()+' km','#79e08a'],['Apogee alt',Math.round((ra-1)*EARTH_KM).toLocaleString()+' km','#ffb454'],
      ['Shape',this.e<0.02?'circle':'ellipse']]); },
  controls(){
    slider({label:'Semi-major axis a (R)',value:2.2,min:1.2,max:6,step:0.05,fmt:v=>v.toFixed(2),on:v=>{this.a=v;this.apply();}});
    slider({label:'Eccentricity e',value:0.45,min:0,max:0.85,step:0.01,fmt:v=>v.toFixed(2),on:v=>{this.e=v;this.apply();}});
  },
  update(dt){ world.children[0].rotation.y+=dt*0.05; world.children[1].rotation.y+=dt*0.05;
    const p=this.a*(1-this.e*this.e), h=Math.sqrt(p); const r=p/(1+this.e*Math.cos(this.th)); this.th+=(h/(r*r))*dt*1.4;
    const pos=new THREE.Vector3(r*Math.cos(this.th),0,r*Math.sin(this.th)); this.sat.position.copy(pos);
    const speed=Math.sqrt(Math.max(0.01,2/r-1/this.a)); const tang=new THREE.Vector3(-Math.sin(this.th),0,Math.cos(this.th));
    this.vArr.position.copy(pos); this.vArr.setDirection(tang); this.vArr.setLength(speed*0.45,0.1,0.07); }
});

MODULES.push({
  title:'Altitude regimes, and the Moon',
  camR:9,
  explain:`<p>Orbits are classified by altitude. <span class="term">LEO</span> spans roughly <b>160 to 2,000 km</b>; the Space Station resides near 400 km and completes a revolution in about 90 minutes. <span class="term">MEO</span> holds the navigation constellations, with GPS near <b>20,200 km</b>. <span class="term">GEO</span> sits at exactly <b>35,786 km</b>, where the period equals one sidereal day, so the satellite holds station over a fixed longitude; this is why fixed ground antennas point at one part of the sky. Far beyond, the <span class="term">Moon</span> orbits at about <b>384,400 km</b>, near 60 Earth radii, the only natural satellite.</p>
  <p>The difficulty is scale. Drawn truthfully, LEO is a thin shell against the surface and the Moon falls off the frame. Use the compressed view to bring every band onto one screen and compare ratios, then switch to true scale and zoom out to register the real emptiness of the gap. The satellite on the GEO ring stays fixed over one longitude as the Earth turns beneath it.</p>`,
  eqs:[
    {tex:String.raw`T = 2\pi\sqrt{\dfrac{a^{3}}{GM}} \;\Rightarrow\; a_{\text{GEO}} = 42{,}164\ \text{km}`, note:'Set the period to one sidereal day and solve for the radius.'},
    {tex:String.raw`h_{\text{GEO}} = a_{\text{GEO}} - R_\oplus = 35{,}786\ \text{km}`, note:'Altitude above the surface follows by subtracting Earth\u2019s radius.'}
  ],
  narr:`Orbits get sorted by altitude. Low Earth orbit runs roughly one hundred sixty to two thousand kilometres. The Space Station lives there near four hundred kilometres, completing a lap every ninety minutes. Medium Earth orbit holds the navigation fleets, with G P S near twenty thousand kilometres. Geostationary orbit sits at exactly thirty five thousand seven hundred eighty six kilometres, where one lap takes a full day, so the satellite holds over a fixed spot on Earth. That is why a fixed dish points at one patch of sky and never moves. Far beyond all of it, the Moon orbits at about three hundred eighty four thousand kilometres, near sixty Earth radii, our only natural satellite. The difficulty here is scale. Drawn truthfully, low orbit is a thin shell against the surface, and the Moon falls off the frame. Use the compressed view to bring every band onto one screen and compare the ratios. Then switch to true scale and zoom out to feel how empty that gap really is. The satellite on the geostationary ring stays locked over one longitude while the Earth turns beneath it.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004));
    this.compressed=true; this.showMoon=true; this.grp=new THREE.Group(); world.add(this.grp); this.rebuild();
  },
  map(r){ return this.compressed ? 1+Math.log10(r)/Math.log10(60.3)*7 : r; },
  rebuild(){ disposeGroup(this.grp);
    [['LEO 400 km',rU(400),0x6fe0ff],['LEO top 2,000 km',rU(2000),0x5ad1ff],['MEO / GPS 20,200 km',rU(20200),0x8a7bff],['GEO 35,786 km',rU(35786),0xffb454]].forEach(b=>{
      const R=this.map(b[1]); const c=circle(R,b[2],0.8); c.rotation.x=Math.PI/2; this.grp.add(c);
      const l=label(b[0],'#'+b[2].toString(16).padStart(6,'0')); l.position.set(0,0,R); this.grp.add(l); });
    this.geoR=this.map(rU(35786)); this.geo=dot(0.07,0xffffff); this.grp.add(this.geo);
    if(this.showMoon){ const Rm=this.map(60.3); const mo=circle(Rm,0x9fb4d6,0.5); mo.rotation.x=Math.PI/2; this.grp.add(mo);
      const moon=dot(0.273*(this.compressed?0.5:1),0xcfd6e2); moon.position.set(Rm,0,0); this.grp.add(moon);
      const ml=label('Moon 384,400 km','#cfd6e2'); ml.position.set(Rm,0.3,0); this.grp.add(ml); }
    setRail('Altitude bands',[['ISS / LEO','~400 km','#6fe0ff'],['GPS / MEO','20,200 km','#8a7bff'],
      ['GEO','35,786 km','#ffb454'],['Moon','384,400 km','#cfd6e2'],['View',this.compressed?'compressed (log)':'true scale','#5ad1ff']]); },
  controls(){
    toggleRow([{label:'Compressed scale',on:true,cb:on=>{this.compressed=on;this.rebuild();cam.r=on?9:80;}},
      {label:'Show Moon',on:true,cb:on=>{this.showMoon=on;this.rebuild();}}]);
  },
  update(dt){ world.children[0].rotation.y+=dt*0.1; world.children[1].rotation.y+=dt*0.1;
    this.gt=(this.gt||0)+dt*0.1; if(this.geo) this.geo.position.set(this.geoR*Math.cos(-this.gt),0,this.geoR*Math.sin(-this.gt)); }
});

MODULES.push({
  title:'Launch sites, delta-v, and plane changes',
  camR:3.8,
  explain:`<p>A given orbit cannot be reached from an arbitrary site. The orbital plane must contain both the centre of the Earth and the launch point, so <b>the minimum reachable inclination equals the launch latitude</b>. From the equator any inclination down to zero is attainable; from 45 degrees north, 45 degrees is the floor absent a costly correction. This is why equatorial sites such as Kourou are valued, and why lower latitude pads are preferred for equatorial missions.</p>
  <p>Direction also matters. The Earth rotates eastward, contributing a free velocity of about <b>465 m/s</b> at the equator, scaled by the cosine of latitude. Launching east captures it, which is standard practice and also carries spent stages out over open ocean. The expensive operation is the <span class="term">plane change</span>: rotating the velocity vector by an angle costs delta-v proportional to the orbital speed itself. Near 7.7 km/s, even a 30 degree change consumes close to 4 km/s, frequently more than the climb to orbit. The plane is therefore chosen on the ground, not corrected in space.</p>`,
  eqs:[
    {tex:String.raw`i_{\min} = |\,\varphi_{\text{launch}}\,|`, note:'Minimum inclination is set by the launch latitude.'},
    {tex:String.raw`\Delta v_{\text{rot}} = 465\,\cos\varphi \ \ \mathrm{m/s}\ \ (\text{eastward})`, note:'The free contribution from Earth\u2019s rotation.'},
    {tex:String.raw`\Delta v_{\text{plane}} = 2\,v\,\sin\!\left(\frac{\Delta i}{2}\right)`, note:'Cost of rotating the orbital plane by an angle delta i.'}
  ],
  narr:`You do not get to pick any orbit from any spot on Earth. The orbital plane has to contain both the centre of the Earth and your launch site. So the lowest inclination you can reach equals your launch latitude. Launch from the equator, and you can reach anything, all the way down to zero. Launch from forty five degrees north, and forty five degrees is your floor, unless you pay for an expensive correction later. That is why equatorial launch sites are prized. Direction matters too. The Earth already spins eastward, and that gives you a free velocity of about four hundred sixty five metres per second at the equator, scaled down by the cosine of your latitude. Launch eastward and you pocket that speed, which is the standard, and it also sends spent stages out over open ocean. The expensive operation is the plane change. Rotating your velocity vector by some angle costs delta v proportional to the orbital speed itself. Near seven point seven kilometres per second, even a thirty degree turn burns close to four kilometres per second, often more than the entire climb to orbit. So you choose the right plane on the ground, not in space. Drag the launch latitude and the target inclination, and watch the plane change cost appear the moment you ask for something below your floor.`,
  build(){
    world.add(makeEarth({})); world.add(graticule(1.004,0x2b6da3,30));
    this.lat=28.5; this.tgt=28.5; this.orbit=new THREE.Group(); world.add(this.orbit);
    this.R=1.45; this.orbit.add(circle(this.R,0x5ad1ff,0.9));
    this.site=dot(0.06,0xffb454); world.add(this.site); this.sl=label('launch site','#ffb454'); world.add(this.sl);
    this.east=arrow(new THREE.Vector3(0,0,1),new THREE.Vector3(),0.3,0x79e08a); world.add(this.east); this.apply();
  },
  apply(){ const phi=this.lat*Math.PI/180; const pos=new THREE.Vector3(Math.cos(phi),Math.sin(phi),0).multiplyScalar(1.02);
    this.site.position.copy(pos); this.sl.position.copy(pos.clone().multiplyScalar(1.14)); this.east.position.copy(pos); this.east.setDirection(new THREE.Vector3(0,0,1));
    this.orbit.rotation.set(0,0,0); this.orbit.rotation.z=Math.max(this.tgt,this.lat)*Math.PI/180;
    const east=465*Math.cos(phi); const di=Math.abs(this.tgt-this.lat); const dv=2*7.67*Math.sin((di*Math.PI/180)/2);
    setRail('Launch budget',[['Launch latitude',this.lat.toFixed(0)+'\u00B0','#ffb454'],['Min inclination',this.lat.toFixed(0)+'\u00B0','#5ad1ff'],
      ['Target incl.',this.tgt.toFixed(0)+'\u00B0'],['Eastward bonus','+'+east.toFixed(0)+' m/s','#79e08a'],
      ['Plane change \u0394v',(this.tgt<this.lat?dv.toFixed(2)+' km/s':'0 (above floor)'),this.tgt<this.lat?'#ff6b6b':'#8a97ad']]); },
  controls(){
    slider({label:'Launch latitude',value:28.5,min:0,max:80,step:1,fmt:v=>v+'\u00B0',on:v=>{this.lat=v;this.apply();}});
    slider({label:'Target inclination',value:28.5,min:0,max:90,step:1,fmt:v=>v+'\u00B0',on:v=>{this.tgt=v;this.apply();}});
  },
  update(dt){ world.children[0].rotation.y+=dt*0.04; world.children[1].rotation.y+=dt*0.04; }
});

/* ============================================================ ENGINE ============================================================ */
function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,0.03,3000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
  document.getElementById('app').appendChild(renderer.domElement);
  scene.add(starfield());
  sun=new THREE.DirectionalLight(0xffffff,1.15); sun.position.set(5,3,5); scene.add(sun);
  scene.add(new THREE.AmbientLight(0x40516e,0.7));
  world=new THREE.Group(); scene.add(world);
  bindUI(); bindCamera(); initNarration();
  addEventListener('resize',onResize);
  loadModule(0); lastT=performance.now(); requestAnimationFrame(loop);
  const h=document.getElementById('hint'); h.classList.add('show'); setTimeout(()=>h.classList.remove('show'),3600);
}
function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }
function applyCam(){ const sp=Math.sin(cam.phi);
  const off=new THREE.Vector3(cam.r*sp*Math.sin(cam.theta), cam.r*Math.cos(cam.phi), cam.r*sp*Math.cos(cam.theta));
  camera.position.copy(cam.target).add(off); camera.lookAt(cam.target); }
function loop(now){ const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  if(active && active.update) try{ active.update(dt); }catch(e){}
  applyCam(); renderer.render(scene,camera); requestAnimationFrame(loop); }

/* ---- camera controls: rotate / pinch-zoom / two-finger pan / buttons ---- */
function clampR(){ cam.r=Math.max(cam.rMin,Math.min(cam.rMax,cam.r)); }
function zoomBy(f){ cam.r*=f; clampR(); }
function panByPixels(dx,dy){ const sp=Math.sin(cam.phi);
  const fwd=new THREE.Vector3(-sp*Math.sin(cam.theta),-Math.cos(cam.phi),-sp*Math.cos(cam.theta)).normalize();
  const right=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
  const up=new THREE.Vector3().crossVectors(right,fwd).normalize(); const k=cam.r*0.0017;
  cam.target.addScaledVector(right,-dx*k); cam.target.addScaledVector(up,dy*k); }
function bindCamera(){
  const el=renderer.domElement; let drag=false,lx=0,ly=0,pinchD=0,midX=0,midY=0,panMode=false;
  function dist2(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
  el.addEventListener('mousedown',e=>{drag=true;panMode=e.shiftKey||e.button===2;lx=e.clientX;ly=e.clientY;hideHint();});
  addEventListener('mousemove',e=>{ if(!drag)return; const dx=e.clientX-lx,dy=e.clientY-ly; lx=e.clientX;ly=e.clientY;
    if(panMode)panByPixels(dx,dy); else { cam.theta-=dx*0.006; cam.phi=Math.max(0.08,Math.min(Math.PI-0.08,cam.phi-dy*0.006)); } });
  addEventListener('mouseup',()=>{drag=false;});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('wheel',e=>{ zoomBy(1+Math.sign(e.deltaY)*0.09); e.preventDefault(); },{passive:false});
  el.addEventListener('touchstart',e=>{ hideHint();
    if(e.touches.length===2){ pinchD=dist2(e); midX=(e.touches[0].clientX+e.touches[1].clientX)/2; midY=(e.touches[0].clientY+e.touches[1].clientY)/2; }
    else { drag=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; } },{passive:false});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length===2){ const d=dist2(e); if(pinchD)zoomBy(pinchD/d); pinchD=d;
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2, my=(e.touches[0].clientY+e.touches[1].clientY)/2;
      panByPixels(mx-midX,my-midY); midX=mx; midY=my; e.preventDefault(); return; }
    if(drag){ const dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly; lx=e.touches[0].clientX; ly=e.touches[0].clientY;
      cam.theta-=dx*0.006; cam.phi=Math.max(0.08,Math.min(Math.PI-0.08,cam.phi-dy*0.006)); e.preventDefault(); } },{passive:false});
  el.addEventListener('touchend',e=>{ if(e.touches.length===0)drag=false; pinchD=0; });
  document.getElementById('zin').onclick=()=>zoomBy(0.8);
  document.getElementById('zout').onclick=()=>zoomBy(1.25);
  document.getElementById('btnReset').onclick=()=>resetView();
}
function hideHint(){ const h=document.getElementById('hint'); if(h)h.classList.remove('show'); }
function resetView(){ cam.target.set(0,0,0); cam.r=active&&active.camR?active.camR:3.4; cam.theta=0.7; cam.phi=1.05; }

/* ---- narration: neural audio files, with device-voice fallback ---- */
const AUDIO=[
 "https://kappa.lol/vY35cD","https://kappa.lol/7ojp9i","https://kappa.lol/oAOjt6","https://kappa.lol/LPAMu6",
 "https://kappa.lol/8cFi2F","https://kappa.lol/Q8GP8b","https://kappa.lol/u9tQhR","https://kappa.lol/ZhrlG9"
];
let synth=window.speechSynthesis, voices=[], chosenVoice=null, rate=1, mode='neural', aud=null, devSpeaking=false, devPaused=false;
function initNarration(){
  aud=new Audio(); aud.preload='none';
  try{ aud.preservesPitch=true; aud.mozPreservesPitch=true; aud.webkitPreservesPitch=true; }catch(e){}
  aud.addEventListener('play',setPlayIcon); aud.addEventListener('pause',setPlayIcon); aud.addEventListener('ended',setPlayIcon);
  aud.addEventListener('error',()=>{ if(mode==='neural'){ mode='device'; speakDevice(); } });
  function loadV(){ const all=synth?synth.getVoices():[]; voices=all.filter(v=>/^en/i.test(v.lang)); if(!voices.length)voices=all; populateVoices(); }
  if(synth){ loadV(); synth.onvoiceschanged=loadV; } else { populateVoices(); }
  document.getElementById('playbtn').onclick=toggleSpeak;
  document.getElementById('voiceSel').onchange=e=>{ stopNarration(); const v=e.target.value;
    if(v==='neural'){ mode='neural'; } else { mode='device'; chosenVoice=voices[parseInt(v.slice(4))]||null; } };
  document.getElementById('rateSel').onchange=e=>{ rate=parseFloat(e.target.value); if(aud)aud.playbackRate=rate; if(devSpeaking)speakDevice(); };
}
function populateVoices(){ const sel=document.getElementById('voiceSel'); if(!sel)return;
  let html='<option value="neural">Studio voice (neural)</option>';
  html+=voices.map((v,i)=>'<option value="dev:'+i+'">Device: '+v.name.replace(/\(.*?\)/,'').trim()+'</option>').join('');
  sel.innerHTML=html; sel.value=(mode==='neural')?'neural':sel.value; }
function isPlaying(){ return (mode==='neural') ? (aud && !aud.paused && aud.currentTime>0 && !aud.ended) : (devSpeaking && !devPaused); }
function setPlayIcon(){ const b=document.getElementById('playbtn'); if(b) b.innerHTML = isPlaying()?'&#10073;&#10073;':'&#9658;'; }
function toggleSpeak(){
  if(mode==='neural'){
    if(!AUDIO[idx]){ mode='device'; speakDevice(); return; }
    if(aud.paused){ if(aud.getAttribute('data-i')!==String(idx)){ aud.src=AUDIO[idx]; aud.setAttribute('data-i',String(idx)); aud.playbackRate=rate; }
      aud.playbackRate=rate; aud.play().catch(()=>{ mode='device'; speakDevice(); }); }
    else { aud.pause(); }
    setPlayIcon();
  } else {
    if(devSpeaking&&!devPaused){ synth.pause(); devPaused=true; }
    else if(devSpeaking&&devPaused){ synth.resume(); devPaused=false; }
    else { speakDevice(); }
    setPlayIcon();
  }
}
function speakDevice(){ if(!synth){ return; } synth.cancel(); const u=new SpeechSynthesisUtterance(MODULES[idx].narr);
  if(chosenVoice)u.voice=chosenVoice; u.rate=rate; u.onend=()=>{devSpeaking=false;devPaused=false;setPlayIcon();}; u.onerror=()=>{devSpeaking=false;devPaused=false;setPlayIcon();};
  synth.speak(u); devSpeaking=true; devPaused=false; setPlayIcon(); }
function stopNarration(){ if(aud){ aud.pause(); try{aud.currentTime=0;}catch(e){} aud.removeAttribute('data-i'); } if(synth)synth.cancel(); devSpeaking=false; devPaused=false; setPlayIcon(); }

/* ---- module navigation + UI ---- */
function renderEqs(list){
  const wrap=document.getElementById('eqs'), hdr=document.getElementById('eqhdr');
  wrap.innerHTML='';
  if(!list||!list.length){ wrap.style.display='none'; hdr.style.display='none'; return; }
  wrap.style.display='block'; hdr.style.display='block';
  list.forEach(eq=>{ const row=document.createElement('div'); row.className='eqrow'; const m=document.createElement('div');
    try{ katex.render(eq.tex,m,{displayMode:true,throwOnError:false}); }catch(e){ m.textContent=eq.tex; }
    row.appendChild(m); if(eq.note){ const cap=document.createElement('div'); cap.className='eqcap'; cap.textContent=eq.note; row.appendChild(cap); }
    wrap.appendChild(row); });
}
function loadModule(i){
  idx=Math.max(0,Math.min(MODULES.length-1,i)); active=MODULES[idx];
  stopNarration(); cam.rMin=1.16; cam.rMax=320; resetView();
  disposeGroup(world); setRail('',[]);
  document.getElementById('mtitle').textContent=active.title;
  document.getElementById('explain').innerHTML=active.explain;
  renderEqs(active.eqs);
  C().innerHTML='';
  try{ active.build(); }catch(e){ showErr(e); }
  if(active.controls) try{ active.controls(); }catch(e){}
  buildDots();
  document.getElementById('prev').disabled=(idx===0);
  document.getElementById('next').textContent=(idx===MODULES.length-1)?'Restart \u21BB':'Next \u2192';
  document.getElementById('glabel').textContent='Module '+(idx+1)+' / '+MODULES.length+'  \u00B7  lesson, math, audio';
  document.getElementById('sheetbody').scrollTop=0;
}
function buildDots(){ const d=document.getElementById('dots'); d.innerHTML='';
  MODULES.forEach((m,i)=>{const s=document.createElement('div');s.className='dot'+(i===idx?' active':'');s.title=m.title;
    s.addEventListener('click',()=>loadModule(i)); d.appendChild(s);}); }
function bindUI(){
  document.getElementById('prev').addEventListener('click',()=>loadModule(idx-1));
  document.getElementById('next').addEventListener('click',()=>loadModule(idx===MODULES.length-1?0:idx+1));
  const sheet=document.getElementById('sheet');
  document.getElementById('grip').addEventListener('click',()=>sheet.classList.toggle('collapsed'));
  document.getElementById('btnRail').addEventListener('click',function(){ railHidden=!railHidden; this.classList.toggle('on',!railHidden);
    if(railHidden){ document.getElementById('rail').style.display='none'; } else if(active&&active.apply){active.apply();} else if(active&&active.rebuild){active.rebuild();} else if(active&&active.setAlt){active.setAlt(1000);} else if(active&&active.rail2){active.rail2();} });
}
function showErr(e){ const el=document.getElementById('err'); el.style.display='flex'; el.textContent='Render error: '+(e&&e.message?e.message:e); }

try{ init(); }catch(e){ showErr(e); }
})();
</script>
