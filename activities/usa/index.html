<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multiscale Space Systems | Activities</title>
<style>
:root { --navy:#1b2a4a; --gold:#c9a227; --mute:#8fa0b8; }
* { box-sizing:border-box; }
html,body { margin:0; height:100%; background:#fff;
  font-family:"Franklin Gothic Book","Franklin Gothic Medium","Segoe UI",Arial,sans-serif; }
#hdr { height:54px; background:var(--navy); color:#fff; display:flex; align-items:center; gap:12px; padding:0 14px; }
#hdr img { height:34px; width:34px; border-radius:8px; }
#hdr .t b { display:block; font-size:14px; letter-spacing:1px; }
#hdr .t span { font-size:9.5px; letter-spacing:2.5px; color:var(--gold); }
#tabs { height:44px; display:flex; align-items:stretch; background:#fff; border-bottom:1px solid #e3e8f0; }
#tabs button { flex:1; border:none; background:none; cursor:pointer; font-size:13px; letter-spacing:1.2px;
  color:var(--mute); font-family:inherit; border-bottom:3px solid transparent; }
#tabs button.on { color:var(--navy); font-weight:bold; border-bottom-color:var(--gold); }
#frame { position:absolute; top:98px; left:0; right:0; bottom:0; }
#frame iframe { width:100%; height:100%; border:none; }
</style>
</head>
<body>
<div id="hdr">
  <img src="https://multiscalespacesystems.com/mss-logo-app.png" alt="MSS">
  <div class="t"><b>MULTISCALE SPACE SYSTEMS</b><span>ORBITAL INFRASTRUCTURE</span></div>
</div>
<div id="tabs">
  <button data-s="/study/astrodynamics/">TRAINING</button>
  <button data-s="/activities/usa/product.html" class="on">PRODUCT</button>
  <button data-s="/tools/valuation/">BUSINESS</button>
</div>
<div id="frame"><iframe id="view" src="/activities/usa/product.html"></iframe></div>
<script>
document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#tabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  document.getElementById('view').src = b.dataset.s;
});
</script>
</body>
</html>
